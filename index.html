<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvoGenAgents - 基于多智能体协同的文本生成系统可视化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .code-font {
            font-family: 'JetBrains+Mono', monospace;
        }
        .sidebar-item-active {
            background-color: #eff6ff;
            color: #2563eb;
            border-right: 4px solid #2563eb;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .agent-pulse {
            animation: pulse-blue 2s infinite;
        }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
        /* Fade in animation for content */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0">
        <div class="p-6 border-b border-slate-100 flex items-center space-x-2">
            <div class="bg-blue-600 p-1.5 rounded-lg">
                <i data-lucide="brain-circuit" class="text-white w-6 h-6"></i>
            </div>
            <span class="font-bold text-slate-800 text-lg tracking-tight">EvoGenAgents</span>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4" id="sidebar-nav">
            <div class="px-4 mb-2 text-xs font-semibold text-slate-400 uppercase tracking-wider">系统概览</div>
            <a href="#dashboard" class="sidebar-item flex items-center px-6 py-3 text-slate-600 hover:bg-slate-50 transition-colors" id="nav-dashboard">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i>
                <span class="font-medium">控制面板</span>
            </a>
            
            <div class="px-4 mt-6 mb-2 text-xs font-semibold text-slate-400 uppercase tracking-wider">预处理与 RAG</div>
            <a href="#preprocess" class="sidebar-item flex items-center px-6 py-3 text-slate-600 hover:bg-slate-50 transition-colors" id="nav-preprocess">
                <i data-lucide="file-search" class="w-5 h-5 mr-3"></i>
                <span class="font-medium">文档解析与抽取</span>
            </a>
            <a href="#entity-extraction" class="sidebar-item flex items-center px-6 py-3 text-slate-600 hover:bg-slate-50 transition-colors" id="nav-entity-extraction">
                <i data-lucide="braces" class="w-5 h-5 mr-3"></i>
                <span class="font-medium">文档实体抽取</span>
            </a>
            <a href="#vectordb" class="sidebar-item flex items-center px-6 py-3 text-slate-600 hover:bg-slate-50 transition-colors" id="nav-vectordb">
                <i data-lucide="database" class="w-5 h-5 mr-3"></i>
                <span class="font-medium">向量库与聚类</span>
            </a>
            
            <div class="px-4 mt-6 mb-2 text-xs font-semibold text-slate-400 uppercase tracking-wider">多智能体协作</div>
            <a href="#agents" class="sidebar-item flex items-center px-6 py-3 text-slate-600 hover:bg-slate-50 transition-colors" id="nav-agents">
                <i data-lucide="users" class="w-5 h-5 mr-3"></i>
                <span class="font-medium">协作框架流程</span>
            </a>
            <a href="#generation" class="sidebar-item flex items-center px-6 py-3 text-slate-600 hover:bg-slate-50 transition-colors" id="nav-generation">
                <i data-lucide="file-text" class="w-5 h-5 mr-3"></i>
                <span class="font-medium">生成与校验</span>
            </a>
        </nav>
        
        <div class="p-4 border-t border-slate-100 bg-slate-50">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 font-bold text-xs">专家</div>
                <div>
                    <div class="text-sm font-semibold text-slate-700">领域专家校验</div>
                    <div class="text-xs text-green-500 flex items-center">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-1.5"></span>
                        已连接
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto relative bg-slate-50/50">
        <!-- Top Header -->
        <header class="sticky top-0 z-20 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex items-center justify-between">
            <h1 id="section-title" class="text-xl font-bold text-slate-800">加载中...</h1>
        </header>

        <!-- Content Area -->
        <div id="content-area" class="p-8 max-w-7xl mx-auto fade-in">
            <!-- Content will be injected here -->
            <div class="flex items-center justify-center h-64">
                <div class="flex flex-col items-center space-y-4">
                    <i data-lucide="loader-2" class="w-8 h-8 text-blue-500 animate-spin"></i>
                    <p class="text-slate-500 font-medium">加载内容中...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Router Configuration
        const routes = {
            'dashboard': { title: '控制面板', file: 'pages/dashboard.html' },
            'preprocess': { title: '文档解析与抽取', file: 'pages/preprocess.html' },
            'entity-extraction': { title: '文档实体抽取', file: 'pages/entity-extraction.html' },
            'vectordb': { title: '向量库与聚类', file: 'pages/vectordb.html' },
            'agents': { title: '多智能体协作框架', file: 'pages/agents.html' },
            'generation': { title: '生成与校验', file: 'pages/generation.html' }
        };

        // Initialize Mermaid
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

        function executeEmbeddedScripts(container) {
            const scripts = Array.from(container.querySelectorAll('script'));
            scripts.forEach((oldScript) => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach((attr) => {
                    newScript.setAttribute(attr.name, attr.value);
                });
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                    newScript.async = false;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }

        async function navigate() {
            const hash = window.location.hash.substring(1) || 'dashboard';
            const route = routes[hash] || routes['dashboard'];
            const contentArea = document.getElementById('content-area');
            
            // Update UI State
            document.getElementById('section-title').innerText = route.title;
            if (hash === 'preprocess' || hash === 'entity-extraction' || hash === 'generation') {
                contentArea.classList.remove('max-w-7xl');
                contentArea.classList.add('max-w-none', 'px-4');
            } else {
                contentArea.classList.remove('max-w-none', 'px-4');
                contentArea.classList.add('max-w-7xl');
            }
            
            // Update Sidebar Active State
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('sidebar-item-active');
            });
            const activeNav = document.getElementById('nav-' + hash);
            if (activeNav) activeNav.classList.add('sidebar-item-active');

            // Fetch and Inject Content
            try {
                // Add timestamp to prevent caching
                const response = await fetch(`${route.file}?t=${new Date().getTime()}`, { cache: 'no-store' });
                if (!response.ok) throw new Error('Failed to load page');
                const html = await response.text();
                
                contentArea.innerHTML = html;
                executeEmbeddedScripts(contentArea);
                
                // Re-initialize Lucide Icons
                lucide.createIcons();
                
                // Re-run Mermaid if necessary
                if (html.includes('mermaid')) {
                    // We need to clear previous mermaid cache or use run
                    mermaid.run({
                        nodes: document.querySelectorAll('.mermaid'),
                    });
                }

                // Scroll to top
                document.querySelector('main').scrollTop = 0;
            } catch (error) {
                console.error(error);
                document.getElementById('content-area').innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-600 p-4 rounded-xl">
                        加载页面失败，请检查网络或文件路径。
                    </div>
                `;
            }
        }

        // Listen for hash changes
        window.addEventListener('hashchange', navigate);
        
        // Initial navigation
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            navigate();
        });

        // Start Task functionality
        document.getElementById('start-task-btn').onclick = function() {
            const btn = this;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin"></i> 正在初始化智能体...';
            lucide.createIcons();

            setTimeout(() => {
                window.location.hash = 'agents';
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }, 1500);
        };
    </script>
</body>
</html>
