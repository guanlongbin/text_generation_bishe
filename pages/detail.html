<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试案例详情 - EvoGenAgents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 via-blue-50 to-slate-50 min-h-screen">
    <div class="max-w-3xl mx-auto px-6 py-6">
        
        <div class="mb-6">
            <a href="dashboard.html" class="inline-flex items-center text-slate-500 hover:text-slate-700 text-sm transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i>
                返回
            </a>
        </div>

        <div class="glass-card rounded-2xl p-6 mb-6 shadow-sm">
            <div class="flex items-start justify-between">
                <div>
                    <h1 class="text-xl font-bold text-slate-800">5.1.1 活期支取额度检查</h1>
                    <p class="text-sm text-slate-500 mt-1">活期支取_001</p>
                </div>
                <span class="px-3 py-1.5 bg-red-100 text-red-700 rounded-full text-xs font-semibold">生成错误</span>
            </div>
        </div>

        <div class="space-y-4">
            
            <div class="glass-card rounded-xl p-5 shadow-sm">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center">
                        <i data-lucide="file-text" class="w-4 h-4 text-blue-600"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-slate-800">输入需求</h3>
                </div>
                <p class="text-sm text-slate-600 pl-11">5.1.1 业务规则: 活期支取的交易金额需要进行额度检查。如果超过限额，根据限额类型处理方式进行控制。</p>
            </div>

            <div class="glass-card rounded-xl p-5 shadow-sm">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 rounded-lg bg-emerald-100 flex items-center justify-center">
                        <i data-lucide="link" class="w-4 h-4 text-emerald-600"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-slate-800">关联信息</h3>
                </div>
                <div class="pl-11 space-y-2">
                    <div class="flex items-center gap-2 text-sm">
                        <span class="text-slate-500">限额类型:</span>
                        <span class="text-slate-700 font-medium">["单笔限额", "日累计限额", "月累计限额"]</span>
                    </div>
                    <div class="flex items-center gap-2 text-sm">
                        <span class="text-slate-500">处理方式:</span>
                        <span class="text-slate-700 font-medium">["拒绝交易", "部分支取", "需人工授权"]</span>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-xl p-5 shadow-sm">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 rounded-lg bg-purple-100 flex items-center justify-center">
                        <i data-lucide="database" class="w-4 h-4 text-purple-600"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-slate-800">RAG 检索内容</h3>
                </div>
                <div class="pl-11 space-y-3">
                    <div class="p-3 bg-slate-50 rounded-lg">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs font-medium text-slate-700">活期储蓄业务规则</span>
                            <span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded text-xs">92.1%</span>
                        </div>
                        <p class="text-xs text-slate-500">活期存款支取业务操作规程及额度管理规定</p>
                    </div>
                    <div class="p-3 bg-slate-50 rounded-lg">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs font-medium text-slate-700">交易监控规则</span>
                            <span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded text-xs">85.6%</span>
                        </div>
                        <p class="text-xs text-slate-500">大额交易监控及异常交易识别处理流程</p>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-xl p-5 shadow-sm border-2 border-red-200 bg-red-50/50">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 rounded-lg bg-red-100 flex items-center justify-center">
                        <i data-lucide="file-check" class="w-4 h-4 text-red-600"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-red-700">生成结果</h3>
                </div>
                <div class="pl-11">
                    <p class="text-sm text-red-600 font-mono">验证金额: -5000.00</p>
                </div>
            </div>

            <div class="glass-card rounded-xl p-5 shadow-sm">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 rounded-lg bg-amber-100 flex items-center justify-center">
                        <i data-lucide="lightbulb" class="w-4 h-4 text-amber-600"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-slate-800">智能体反思</h3>
                </div>
                <div class="pl-11 p-3 bg-amber-50 rounded-lg border border-amber-200">
                    <p class="text-sm text-red-600">生成错误，金额字段不能为负数</p>
                </div>
            </div>

            <div class="glass-card rounded-xl p-5 shadow-sm">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center">
                        <i data-lucide="user-check" class="w-4 h-4 text-indigo-600"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-slate-800">人工复核</h3>
                </div>
                <div class="pl-11 mt-4">
                    <div class="flex gap-3">
                        <button onclick="submitReview('approve')" class="flex-1 px-4 py-2.5 bg-emerald-500 text-white rounded-lg text-sm font-medium hover:bg-emerald-600 transition-colors shadow-sm">
                            通过
                        </button>
                        <button onclick="submitReview('reject')" class="flex-1 px-4 py-2.5 bg-red-500 text-white rounded-lg text-sm font-medium hover:bg-red-600 transition-colors shadow-sm">
                            失败
                        </button>
                    </div>
                    <textarea rows="3" placeholder="经验反馈" class="w-full mt-3 px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        function submitReview(type) {
            alert(type === 'approve' ? '已通过' : '已标记失败');
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
