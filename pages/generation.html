<div class="h-full flex flex-col m-0 p-0">
    <div class="px-2 py-2 border-b border-slate-100 flex justify-between items-center flex-shrink-0">
        <div class="flex items-center space-x-4">
            <h4 class="text-md font-bold text-slate-800">个人存款账户账户开户交易生成测试案例列表</h4>
            <span id="totalCount" class="text-xs text-slate-400">-</span>
        </div>
        <div class="flex items-center space-x-3 flex-wrap gap-2">
            <span class="text-xs text-slate-400">置信度 &gt;=</span>
            <input type="range" id="confidenceFilter" min="0" max="10" value="6" step="0.1" class="w-24 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer" onchange="applyFilters()">
            <span id="filterValue" class="text-xs font-bold text-blue-600 w-12">6.0</span>
            <select id="typeFilter" onchange="applyFilters()" class="text-xs px-2 py-1 border border-slate-200 rounded focus:outline-none">
                <option value="">所有类型</option>
            </select>
            <select id="statusFilter" onchange="applyFilters()" class="text-xs px-2 py-1 border border-slate-200 rounded focus:outline-none">
                <option value="">所有状态</option>
                <option value="通过校验">通过校验</option>
                <option value="待人工复核">待人工复核</option>
                <option value="校验失败">校验失败</option>
            </select>
            <input type="text" id="searchInput" placeholder="搜索..." class="text-xs px-3 py-1 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="applyFilters()">
        </div>
    </div>
    <div class="flex-1 overflow-auto">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-100 text-xs font-bold text-slate-600 uppercase tracking-wider sticky top-0 z-10">
                <tr>
                    <th class="py-1 px-2 border-r border-slate-300">序号</th>
                    <th class="py-1 px-2 border-r border-slate-300">需求条目</th>
                    <th class="py-1 px-2 border-r border-slate-300">类型</th>
                    <th class="py-1 px-2 border-r border-slate-300">功能要素</th>
                    <th class="py-1 px-2 border-r border-slate-300">测试要点</th>
                    <th class="py-1 px-2 border-r border-slate-300">召回编号</th>
                    <th class="py-1 px-2 border-r border-slate-300">本条生成依据</th>
                    <th class="py-1 px-2 border-r border-slate-300">相似度得分</th>
                    <th class="py-1 px-2 border-r border-slate-300">召回需求条目</th>
                    <th class="py-1 px-2 border-r border-slate-300">置信度</th>
                    <th class="py-1 px-2">状态</th>
                </tr>
            </thead>
            <tbody id="testCaseBody" class="text-xs">
            </tbody>
        </table>
    </div>
    <div class="px-2 py-2 border-t border-slate-100 flex items-center justify-between flex-shrink-0">
        <div class="text-xs text-slate-500">
            显示 <span id="showingFrom">-</span>-<span id="showingTo">-</span> 条，共 <span id="totalFiltered">-</span> 条
        </div>
        <div class="flex items-center space-x-2">
            <button id="prevBtn" onclick="prevPage()" class="px-3 py-1 text-xs bg-slate-100 text-slate-600 rounded hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed">上一页</button>
            <span id="pageInfo" class="text-xs text-slate-600">1 / 1</span>
            <button id="nextBtn" onclick="nextPage()" class="px-3 py-1 text-xs bg-slate-100 text-slate-600 rounded hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed">下一页</button>
        </div>
    </div>
</div>

<script>
    let allData = [];
    let filteredData = [];
    let currentPage = 1;
    const pageSize = 30;

    async function loadTestData() {
        try {
            const response = await fetch('test_data.json');
            allData = await response.json();
            filteredData = [...allData];
            document.getElementById('totalCount').textContent = `共 ${allData.length} 条`;
            populateFilters();
            applyFilters();
        } catch (error) {
            console.error('Failed to load test data:', error);
        }
    }

    function populateFilters() {
        const types = [...new Set(allData.map(d => d.type).filter(Boolean))];
        const typeSelect = document.getElementById('typeFilter');
        types.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t;
            typeSelect.appendChild(opt);
        });
    }

    function getConfidenceColor(conf) {
        if (conf >= 7.5) return 'green';
        if (conf >= 6) return 'orange';
        return 'red';
    }

    function getStatusBadge(status) {
        const badges = {
            '通过校验': 'bg-green-50 text-green-600',
            '待人工复核': 'bg-orange-100 text-orange-700',
            '校验失败': 'bg-red-100 text-red-700'
        };
        return badges[status] || 'bg-slate-100 text-slate-600';
    }

    function applyFilters() {
        const minConf = parseFloat(document.getElementById('confidenceFilter').value);
        const search = document.getElementById('searchInput').value.toLowerCase();
        const typeVal = document.getElementById('typeFilter').value;
        const statusVal = document.getElementById('statusFilter').value;
        document.getElementById('filterValue').textContent = minConf.toFixed(1);

        filteredData = allData.filter(item => {
            const matchConf = item.confidence >= minConf;
            const matchSearch = !search || 
                item.id.toLowerCase().includes(search) ||
                item.point.toLowerCase().includes(search) ||
                item.transaction.toLowerCase().includes(search) ||
                item.module.toLowerCase().includes(search) ||
                item.requirement.toLowerCase().includes(search);
            const matchType = !typeVal || item.type === typeVal;
            const matchStatus = !statusVal || item.status === statusVal;
            return matchConf && matchSearch && matchType && matchStatus;
        });

        currentPage = 1;
        renderTable();
        updatePagination();
    }

    function renderTable() {
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pageData = filteredData.slice(start, end);

        const tbody = document.getElementById('testCaseBody');
        let html = '';
        let lastRequirement = '';
        let requirementCount = 0;
        let requirementIndex = 0;

        pageData.forEach((item, idx) => {
            const isNewRequirement = item.requirement !== lastRequirement;
            if (isNewRequirement) {
                requirementCount = pageData.filter(d => d.requirement === item.requirement).length;
                lastRequirement = item.requirement;
                requirementIndex++;
            }

            const seqNum = item.id.split('_').pop();
            const bgClass = requirementIndex % 2 === 1 ? 'bg-blue-50' : 'bg-green-50';
            
            html += `<tr class="${bgClass} hover:bg-blue-100 cursor-pointer transition-colors border-b border-slate-200" onclick="showDetail('${encodeURIComponent(item.id)}')">`;

            html += `<td class="px-2 py-1 text-slate-400 text-[10px] align-middle border-r border-slate-200">${seqNum}</td>`;

            if (isNewRequirement) {
                html += `<td class="px-2 py-1 text-slate-600 text-xs align-middle max-w-[200px] whitespace-normal border-r border-slate-200" rowspan="${requirementCount}">${item.requirement}</td>`;
                html += `<td class="px-1 py-1 align-middle border-r border-slate-200" rowspan="${requirementCount}"><span class="px-1 py-0.5 bg-blue-100 text-blue-700 font-bold rounded whitespace-nowrap text-[10px]">${item.type}</span></td>`;
                html += `<td class="px-2 py-1 text-slate-600 max-w-[80px] whitespace-normal align-middle border-r border-slate-200" rowspan="${requirementCount}">${item.element}</td>`;
            }

            html += `<td class="px-2 py-1 text-slate-600 max-w-[400px] whitespace-normal align-middle border-r border-slate-200">${item.point}</td>`;
            
            if (isNewRequirement) {
                html += `<td class="px-2 py-1 text-slate-500 max-w-[50px] whitespace-normal align-middle border-r border-slate-200" rowspan="${requirementCount}">${item.original_id}</td>`;
                html += `<td class="px-2 py-1 text-slate-500 max-w-[40px] whitespace-normal align-middle border-r border-slate-200" rowspan="${requirementCount}">${item.data_source}</td>`;
                html += `<td class="px-2 py-1 text-slate-500 max-w-[40px] whitespace-normal align-middle border-r border-slate-200" rowspan="${requirementCount}">${item.data_source === 'AI生成' ? '' : (item.score % 1).toFixed(4)}</td>`;
                html += `<td class="px-2 py-1 text-slate-400 max-w-[200px] whitespace-normal align-middle border-r border-slate-200" rowspan="${requirementCount}">${item.old_requirement}</td>`;
            }
            
            html += `<td class="px-2 py-1 align-middle border-r border-slate-200">
                <div class="flex items-center">
                    <span class="font-bold text-${getConfidenceColor(item.confidence)}-600 mr-1">${item.confidence.toFixed(1)}</span>
                    <div class="w-10 h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-${getConfidenceColor(item.confidence)}-500" style="width: ${item.confidence * 10}%"></div>
                    </div>
                </div>
            </td>
            <td class="px-2 py-1 align-middle"><span class="px-2 py-0.5 ${getStatusBadge(item.status)} font-bold rounded whitespace-nowrap">${item.status}</span></td>
            </tr>`;
        });

        tbody.innerHTML = html;

        document.getElementById('showingFrom').textContent = filteredData.length > 0 ? start + 1 : 0;
        document.getElementById('showingTo').textContent = Math.min(end, filteredData.length);
        document.getElementById('totalFiltered').textContent = filteredData.length;
    }

    function updatePagination() {
        const totalPages = Math.ceil(filteredData.length / pageSize) || 1;
        document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
        document.getElementById('prevBtn').disabled = currentPage <= 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages;
    }

    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            renderTable();
            updatePagination();
        }
    }

    function nextPage() {
        const totalPages = Math.ceil(filteredData.length / pageSize);
        if (currentPage < totalPages) {
            currentPage++;
            renderTable();
            updatePagination();
        }
    }

                <div class="pt-2 border-t border-slate-200">
                    <p class="text-xs text-slate-500 mb-1">生成结果</p>

    function closeDetail() {
        document.getElementById('detailModal').classList.add('hidden');
        currentDetailId = null;
    }

    function submitReview(type) {

    }

    function copyToFeedback(text) {
        document.querySelector('#detailModal textarea').value = text;
    }

    loadTestData();
</script>
